name: Checkstyle

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  checkstyle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Checkstyle
        run: ./app/gradlew checkstyleMain checkstyleTest